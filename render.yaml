services:
  - type: web
    name: background-removal-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: 8000
    disk:
      name: data
      mountPath: /opt/render/project/.cache
      sizeGB: 1
